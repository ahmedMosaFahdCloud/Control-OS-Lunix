<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- CPU body -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="none" stroke="#38bdf8" stroke-width="1.8"/>
  <!-- Inner chip -->
  <rect x="12" y="12" width="8" height="8" rx="1" fill="#38bdf8" opacity="0.9"/>
  <!-- Pins - top -->
  <line x1="12" y1="9" x2="12" y2="6" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="9" x2="16" y2="6" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="9" x2="20" y2="6" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins - bottom -->
  <line x1="12" y1="23" x2="12" y2="26" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="26" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="23" x2="20" y2="26" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins - left -->
  <line x1="9" y1="12" x2="6" y2="12" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="16" x2="6" y2="16" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="20" x2="6" y2="20" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins - right -->
  <line x1="23" y1="12" x2="26" y2="12" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="26" y2="16" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="20" x2="26" y2="20" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
